<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gapless ABR Audio Player</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: system-ui, sans-serif; background: #121212; color: #ffffff; padding: 20px; }
        .dashboard { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; flex: 1; border: 1px solid #333; }
        .value { font-size: 2rem; font-weight: bold; color: #4ade80; }
        button { background: #4ade80; color: #000; padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px;}
        button:hover { background: #22c55e; }
        button:disabled { background: #555; cursor: not-allowed; }
        .log-container { background: #000; padding: 15px; border-radius: 8px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 14px; border: 1px solid #333; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 5px; }
    </style>
</head>
<body>

    <h2>Gapless ABR Audio Player (Simulated Network)</h2>
    
    <button id="startBtn">▶ Start Playback</button>

    <div class="dashboard">
        <div class="card">
            <h3>Fake Network Bandwidth</h3>
            <div id="bandwidthDisplay" class="value">0 kbps</div>
        </div>
        <div class="card">
            <h3>Currently Playing</h3>
            <div id="bitrateDisplay" class="value">Waiting...</div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 20px; flex: none; width: 100%;">
        <canvas id="bitrateChart" height="80"></canvas>
    </div>

    <h3>Stream Log</h3>
    <div id="logContainer" class="log-container"></div>
    <script src="app.js"></script>
</body>
</html>
